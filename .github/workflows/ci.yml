name: CI - Mafia Nightfall

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18.x
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Generate Prisma Client
      run: npm run prisma:generate -w server

    - name: Run Lint
      run: npm run lint --if-present

    - name: Build Shared
      run: npm run build -w shared

    - name: Run Tests
      run: npm test --if-present

  docker-build-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: actions/setup-docker-action@v1 # Note: Standardizing on community actions or native docker commands

    - name: Build Server Image
      run: docker build -t mafia-server -f server/Dockerfile .

    - name: Build Web Client Image
      run: docker build -t mafia-web-client -f web-client/Dockerfile .
