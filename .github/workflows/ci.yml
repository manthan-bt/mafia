name: CI - Mafia Nightfall

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18.x
        cache: 'npm'
        cache-dependency-path: package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Generate Prisma Client
      run: npm run prisma:generate -w @mafia/server

    - name: Run Lint
      run: npm run lint --if-present

    - name: Build Shared
      run: npm run build -w @mafia/shared

    - name: Run Tests
      run: npm test --if-present

  docker-build-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Server Image
      run: docker build -t mafia-server -f apps/server/Dockerfile .

    - name: Build Web Client Image
      run: docker build -t mafia-web-client -f apps/web/Dockerfile .
