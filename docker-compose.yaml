services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "3005:3005"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/mafia?schema=public
      - REDIS_URL=redis://cache:6379
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
    networks:
      - mafia-net

  web-client:
    build:
      context: .
      dockerfile: web-client/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - mafia-net

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=mafia
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mafia-net

  cache:
    image: redis:7-alpine
    networks:
      - mafia-net

networks:
  mafia-net:
    driver: bridge

volumes:
  postgres_data:
